spring:
  application:
    name: api-cloud-kitchen-restaurant
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:restaurantdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driverClassName: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  defer-datasource-initialization: true
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}
  h2:
    console:
      enabled: true
      path: /h2-console