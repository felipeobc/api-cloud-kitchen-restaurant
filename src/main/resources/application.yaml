spring:
  application:
    name: api-cloud-kitchen-restaurant
  datasource:
    url: jdbc:h2:mem:restaurantdb
    driverClassName: org.h2.Driver
    username: sa
    password: 123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console